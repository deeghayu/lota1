<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING LOTUSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-black text-white">

    <section class="relative h-screen flex flex-col items-center justify-center text-center px-4">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('artist-bg.jpg');"></div>
        <div class="absolute inset-0 bg-black/70"></div>
        <div class="relative border-4 border-[#e11d48] p-10 max-w-2xl">
            <h1 class="text-6xl font-black uppercase">KING LOTTUS </h1>
            <p class="mt-4 text-gray-200">The new wave of rap is here. Stream now.</p>
            <button class="mt-8 px-10 py-3 bg-[#e11d48] hover:bg-pink-700 font-bold uppercase">Play Now</button>
        </div>
    </section>

    <section class="py-20 bg-zinc-900 text-center">
        <h2 class="text-3xl font-bold mb-10 uppercase">YouTube Presence</h2>
        <div class="flex justify-center gap-10">
            <div class="p-6 border border-[#e11d48] w-40">
                <p id="sub-count" class="text-3xl font-black">...</p>
                <p class="text-xs text-gray-400 uppercase mt-2">Subs</p>
            </div>
            <div class="p-6 border border-[#e11d48] w-40">
                <p id="video-count" class="text-3xl font-black">...</p>
                <p class="text-xs text-gray-400 uppercase mt-2">Videos</p>
            </div>
        </div>
    </section>

    <section class="py-20 px-6">
        <h2 class="text-3xl text-center font-black uppercase mb-10">Gallery</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-5xl mx-auto">
            <img src="photo1.jpg" class="w-full h-64 object-cover">
            <img src="photo2.jpg" class="w-full h-64 object-cover">
            <img src="photo3.jpg" class="w-full h-64 object-cover">
        </div>
    </section>

    <nav class="sticky bottom-0 bg-black/90 border-t-4 border-[#e11d48] p-6 flex justify-between items-center px-10">
        <div class="text-xl font-black">LOGO</div>
        <ul class="flex gap-6 uppercase text-sm font-bold">
            <li>Home</li><li>Music</li><li>About</li><li>Contact</li>
        </ul>
    </nav>

    <script>
        // මෙතනට අලුත් API Key එක දාන්න!
        const API_KEY = 'AIzaSyAN2fxeBTCCU07rvmKCnQmp7am0gX0iPOI'; 
        const CHANNEL_ID = 'UCCzcA9JQBXHMQf_B90J3p8A'; 
        const API_URL = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`;

        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                const stats = data.items[0].statistics;
                document.getElementById('sub-count').innerText = parseInt(stats.subscriberCount).toLocaleString();
                document.getElementById('video-count').innerText = parseInt(stats.videoCount).toLocaleString();
            })
            .catch(err => console.error('Error:', err));
    </script>
</body>
</html>
